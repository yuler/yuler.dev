name: PR Screenshots

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate screenshots
        run: pnpm run gen:screenshots

      - name: Upload screenshots artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-screenshots
          path: screenshots/*.png
          if-no-files-found: error

      - name: Comment on PR with screenshots link
        uses: actions/github-script@v7
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- yuler.dev/pr-screenshots -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const artifactId = process.env.ARTIFACT_ID;
            const artifactUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}/artifacts/${artifactId}`;

            const files = fs
              .readdirSync('screenshots')
              .filter((f) => f.endsWith('.png'))
              .sort((a, b) => a.localeCompare(b));

            // screenshots/<slug>.<vp>.png
            // Example: screenshots/home.iphone.png
            const shotsByPage = new Map();
            for (const file of files) {
              const match = file.match(/^(.+)\.(iphone|ipad|pc)\.png$/);
              if (!match) continue;
              const [, slug, vp] = match;
              if (!shotsByPage.has(slug)) shotsByPage.set(slug, {});
              shotsByPage.get(slug)[vp] = file;
            }

            const pageSlugs = Array.from(shotsByPage.keys()).sort((a, b) =>
              a.localeCompare(b),
            );

            // This is a best-effort URL to render individual artifact files inline.
            // GitHub requires authenticated users for artifact file downloads.
            const imgSrc = (file) =>
              `${artifactUrl}/download?path=${encodeURIComponent(
                file,
              )}`;

            const cell = (slug, vp) => {
              const file = shotsByPage.get(slug)?.[vp];
              if (!file) return '-';
              const src = imgSrc(file);
              if (vp === 'iphone') {
                return `<b>${slug}</b><br/><img src="${src}" alt="${slug} ${vp}" width="260" />`;
              }
              return `<img src="${src}" alt="${slug} ${vp}" width="260" />`;
            };

            const table = [
              '| iphone | ipad | pc |',
              '| --- | --- | --- |',
              ...pageSlugs.map(
                (slug) =>
                  `| ${cell(slug, 'iphone')} | ${cell(slug, 'ipad')} | ${cell(slug, 'pc')} |`,
              ),
            ].join('\n');

            const body = [
              marker,
              `### 📸 Screenshots for PR #${issue_number}`,
              ``,
              table,
              ``,
              `Download artifact: ${artifactUrl}`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
